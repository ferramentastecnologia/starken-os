# ============================================================================
# Starken OS — Nginx Configuration
# AlmaLinux / RHEL / CentOS
# ============================================================================
#
# Para AlmaLinux (Hostinger):
#   1. SSH na VPS: ssh root@187.77.46.199
#   2. Copiar este arquivo:
#      cp /home/ubuntu/apps/starken-os/nginx.conf /etc/nginx/conf.d/starkentecnologia.conf
#   3. Testar: sudo nginx -t
#   4. Recarregar: sudo systemctl reload nginx
#
# ============================================================================

upstream starken_api {
    # Node.js server (Express rodando em localhost:3000)
    server localhost:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name app.starkentecnologia.com;

    location / {
        return 301 https://$server_name$request_uri;
    }

    # Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

# HTTPS — Main Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.starkentecnologia.com;

    # ========== SSL / HTTPS ==========
    # Gerado via Let's Encrypt (certbot)
    ssl_certificate /etc/letsencrypt/live/app.starkentecnologia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.starkentecnologia.com/privkey.pem;

    # SSL Security (Mozilla Modern Profile)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS (recomendado para produção)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ========== ROOT DIR ==========
    # Diretório onde está checklist-relatorios.html
    root /home/ubuntu/apps/starken-os;
    index checklist-relatorios.html;

    # ========== GZIP COMPRESSION ==========
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/xml+rss
               application/json application/javascript;

    # ========== LOGGING ==========
    access_log /var/log/nginx/starken_access.log combined;
    error_log /var/log/nginx/starken_error.log warn;

    # ========== FRONTEND — HTML/CSS/JS ==========
    # Servir arquivos estáticos
    location / {
        # Try file, directory, then fallback para SPA (checklist-relatorios.html)
        try_files $uri $uri/ /checklist-relatorios.html;

        # Cache assets por 1 dia
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # ========== STATIC ASSETS — Long Cache ==========
    # Imagens, CSS, JS (cache 1 ano se nomes mudam)
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ========== API PROXY → Node.js ==========
    # Rotear /api/* para Express em localhost:3000
    location /api/ {
        # Proxy settings
        proxy_pass http://starken_api;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        # Timeouts (para uploads)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # ========== DENY ACCESS ==========
    # Bloquear acesso a .env, .git, etc
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Bloquear acesso a backups
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ========== SECURITY HEADERS ==========
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ========== RATE LIMITING (OPCIONAL) ==========
    # Descomente se quiser limitar requisições
    # limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    # location /api/ {
    #     limit_req zone=api_limit burst=20 nodelay;
    #     ...
    # }
}
