    container_name: squad-advisory-board
    profiles: ["squads"]
    restart: unless-stopped
    environment:
      - SQUAD_NAME=advisory-board
      - LITELLM_BASE_URL=${LITELLM_BASE_URL:-http://litellm-proxy:4000}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
    volumes:
      - C:/Users/Juan/Documents/GitHub/xquads-squads-main/xquads-squads-main:/squads:ro
    depends_on:
