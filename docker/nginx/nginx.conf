server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index starken-os.html;

    # Serve the SPA
    location / {
        try_files $uri $uri/ /starken-os.html;
    }

    # Proxy API routes to assessoria-api
    location /api/ {
        proxy_pass http://assessoria-api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Proxy squad requests to squad-router
    location /squad/ {
        proxy_pass http://squad-router:4001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # Health check endpoint
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
