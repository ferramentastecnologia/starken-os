<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Preview do Vídeo — Starken OS</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0f0f0f; font-family:Inter,-apple-system,sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .container { max-width:500px; width:95%; text-align:center; }
  video { width:100%; max-height:80vh; border-radius:16px; box-shadow:0 20px 60px rgba(0,0,0,0.5); background:#000; }
  .brand { margin-top:20px; font-size:12px; color:rgba(255,255,255,0.3); }
  .brand a { color:rgba(255,255,255,0.4); text-decoration:none; }
  .error { color:#ef4444; font-size:14px; padding:40px; }
  .download { margin-top:16px; display:inline-block; padding:8px 20px; background:rgba(255,255,255,0.1); color:#fff; border-radius:8px; font-size:13px; text-decoration:none; border:1px solid rgba(255,255,255,0.15); }
  .download:hover { background:rgba(255,255,255,0.2); }
</style>
</head>
<body>
<div class="container">
  <div id="player"></div>
  <div id="actions"></div>
  <div class="brand">Powered by <a href="https://starken-os.vercel.app">Starken OS</a></div>
</div>
<script>
  var params = new URLSearchParams(window.location.search);
  var src = params.get('src') || params.get('url') || '';
  var playerEl = document.getElementById('player');
  var actionsEl = document.getElementById('actions');

  if (!src) {
    playerEl.innerHTML = '<div class="error">Nenhum vídeo especificado</div>';
  } else {
    playerEl.innerHTML = '<video id="vid" src="' + src + '" controls autoplay muted playsinline></video>';
    actionsEl.innerHTML = '<a href="' + src + '" download class="download">⬇ Baixar vídeo</a>';
    // Update title with filename
    var name = src.split('/').pop().split('?')[0].replace(/_/g, ' ');
    document.title = name + ' — Starken OS';
    // Unmute after autoplay starts (Chrome requires muted for autoplay)
    var vid = document.getElementById('vid');
    vid.addEventListener('playing', function() { vid.muted = false; }, { once: true });
  }
</script>
</body>
</html>
